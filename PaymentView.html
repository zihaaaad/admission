<div class="instructions-box">
    <h3>জরুরি নির্দেশনা:</h3>
    <p id="instructions"></p>
</div>

<form id="paymentForm">
    <!-- Verification Section -->
    <div class="form-group">
        <label for="phone">রেজিস্টার করা মোবাইল নম্বর</label>
        <div class="verify-row">
            <input type="tel" id="phone" name="phone" class="app-input" placeholder="01xxxxxxxxx" required>
            <button type="button" class="app-button btn-primary" onclick="verifyPhoneNumber()">চেক করুন</button>
        </div>
        <div id="paymentStatus" class="status-text"></div>
        <div id="paymentLoader" class="loader"></div>
    </div>

    <!-- Candidate Info & Payment Submit Section -->
    <div id="detailsSection" class="details-box" style="display: none;">
        <div class="candidate-info">
            <p><strong>নাম:</strong> <span id="nameDisplay"></span></p>
            <p><strong>সিরিয়াল নম্বর:</strong> <span id="serialDisplay"></span></p>
        </div>
        
        <!-- Hidden Inputs for Form Submission -->
        <input type="hidden" id="nameInput" name="name">
        <input type="hidden" id="serialInput" name="serial">
        <input type="hidden" id="districtInput" name="district">

        <div class="form-group">
            <label for="paymentMethod">পেমেন্ট করার মাধ্যম</label>
            <select id="paymentMethod" name="paymentMethod" class="app-select" required></select>
        </div>

        <div class="form-group">
            <label for="paymentSource">যে নম্বর থেকে টাকা পাঠিয়েছেন</label>
            <input type="tel" id="paymentSource" name="paymentSource" class="app-input" placeholder="01xxxxxxxxx" required>
        </div>

        <div class="form-group">
            <label for="trxId">Transaction ID (TrxID)</label>
            <input type="text" id="trxId" name="trxId" class="app-input" placeholder="TrxID লিখুন" required>
        </div>

        <button type="submit" id="submitBtn" class="app-button btn-primary">ফি জমা দিন</button>
    </div>
</form>

<div class="back-nav">
    <button type="button" class="app-button btn-secondary back-button" onclick="showView('landingView')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        মূল পাতায় ফিরে যান
    </button>
</div>
