<!DOCTYPE html>
<html lang="bn">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon for brand identity in the browser tab -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/RZ4wD83V/skill-color-logo-32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Improved Bengali font for better readability and number rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================
           GLOBAL STYLES & UI KIT - DEEP FOREST NATURAL THEME
           Mobile-First Responsive Design
           ================================================ */
        :root {
            --primary-color: #1A3E2F;
            --primary-light: #2D5A46;
            --primary-subtle: #E8F0EB;
            --success-color: #2E6B4E;
            --danger-color: #8C2D19;
            --bg-color: #F0F3F1;
            --text-dark: #1E2722;
            --text-light: #52635A;
            --text-muted: #8A9690;
            --card-bg: #FFFFFF;
            --border-color: #D0DCD5;
            --border-light: #E8EDEA;
            --shadow-sm: 0 2px 8px rgba(26, 62, 47, 0.04);
            --shadow-md: 0 8px 24px rgba(26, 62, 47, 0.06);
            --shadow-lg: 0 12px 40px rgba(26, 62, 47, 0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.65;
            min-height: 100vh;
        }

        /* --- Container: Edge-to-edge on phones --- */
        .container {
            max-width: 580px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            min-height: 100vh;
        }

        /* --- Header --- */
        .header {
            text-align: center;
            padding: 2rem 1.5rem 1.8rem;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(180deg, #FAFCFA 0%, #FFFFFF 100%);
        }
        .header img {
            max-width: 140px;
            margin-bottom: 0.8rem;
        }
        .header h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.01em;
            line-height: 1.4;
        }

        /* --- Views --- */
        .view {
            display: none;
            padding: 1.5rem 1.25rem 2rem;
            animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .view > h3 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.4rem;
        }
        .view > p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            line-height: 1.6;
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(6px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- Form Controls --- */
        .app-input, .app-select {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border-color);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: 'Noto Sans Bengali', sans-serif;
            background-color: #FCFDFC;
            color: var(--text-dark);
            -webkit-appearance: none;
        }
        .app-input:focus, .app-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(26, 62, 47, 0.08);
            background-color: #FFFFFF;
        }
        .app-input::placeholder { color: var(--text-muted); }

        /* --- Buttons --- */
        .app-button {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            background-color: var(--primary-color);
            min-height: 48px;
            font-family: 'Noto Sans Bengali', sans-serif;
        }
        .app-button:hover:not(:disabled) {
            background-color: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 62, 47, 0.15);
        }
        .app-button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }
        .app-button:disabled {
            background-color: #C3CDC7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- Loader --- */
        .loader {
            display: none;
            border: 3px solid var(--border-light);
            border-radius: 50%;
            border-top: 3px solid var(--primary-color);
            width: 28px;
            height: 28px;
            animation: spin 0.7s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* --- Back Button --- */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0.6rem 0;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }
        .back-button:hover { color: var(--primary-color); }
        .back-nav { margin-top: 1.5rem; text-align: center; padding-top: 1rem; border-top: 1px solid var(--border-light); }

        /* --- Status & Label --- */
        .status-text { font-weight: 500; margin-top: 0.5rem; min-height: 20px; font-size: 0.85rem; line-height: 1.5; }
        .text-success { color: var(--success-color); }
        .text-danger { color: var(--danger-color); }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; color: var(--primary-color); }
        
        /* ================================================
           LANDING PAGE
           ================================================ */
        #landingView { text-align: center; }
        #landingView h3 {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        #landingView > p {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 1.5rem;
        }
        .nav-button {
            padding: 0.95rem;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            border: 1.5px solid transparent;
            border-radius: var(--radius-sm);
        }
        .btn-primary { background-color: var(--primary-color); }
        .btn-secondary {
            background-color: transparent;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: var(--primary-subtle);
            color: var(--primary-color);
        }
        .btn-tertiary {
            background-color: transparent;
            border-color: var(--border-color);
            color: var(--text-light);
        }
        .btn-tertiary:hover:not(:disabled) {
            background-color: #F5F7F6;
            color: var(--text-dark);
            border-color: var(--text-light);
        }

        /* ================================================
           SEARCH FORMS (Result & Status)
           ================================================ */
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .search-form .app-button {
            margin-top: 0;
        }

        /* ================================================
           RESULT & STATUS CARDS
           ================================================ */
        .info-card {
            margin-top: 1.25rem;
            padding: 1.25rem;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border-color);
            background-color: #FAFCFA;
        }
        .info-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: var(--primary-color);
        }
        .info-card p { color: var(--text-light); font-size: 0.9rem; line-height: 1.6; }
        
        .status-final { border-color: var(--success-color); background-color: #F2FAF6; }
        .status-final h3 { color: var(--success-color); }
        .status-viva, .status-waiting { border-color: var(--primary-light); background-color: #F6FAF8; }
        .status-viva h3, .status-waiting h3 { color: var(--primary-light); }
        .status-not-selected { border-color: var(--danger-color); background-color: #FDF6F5; }
        .status-not-selected h3 { color: var(--danger-color); }
        
        .info-grid { margin-top: 1rem; border-top: 1px dashed var(--border-color); padding-top: 0.8rem; }
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.55rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-light);
            gap: 0.75rem;
        }
        .info-item:last-child { border-bottom: none; }
        .info-item .label { font-weight: 500; color: var(--text-light); white-space: nowrap; flex-shrink: 0; }
        .info-item span:last-child { text-align: right; word-break: break-word; }

        /* ================================================
           PAYMENT FORM
           ================================================ */
        .instructions-box {
            background: #FCFAF6;
            border: 1.5px solid #EDE2CF;
            padding: 1rem 1.1rem;
            margin-bottom: 1.5rem;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            color: #735F3F;
            line-height: 1.65;
        }
        .instructions-box h3 {
            font-size: 0.92rem;
            font-weight: 700;
            color: #8B6B3D;
            margin-bottom: 0.4rem;
        }
        .verify-row {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .verify-row .app-button {
            margin-top: 0;
        }
        .form-group { margin-bottom: 1.1rem; }
        .details-box {
            background-color: #FAFCFA;
            padding: 1.25rem;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--success-color);
            margin-top: 1.25rem;
        }
        .candidate-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed var(--border-color);
            font-size: 0.95rem;
        }
        .candidate-info p { margin: 0; }

        #successMessage { text-align: center; padding: 2.5rem 1.25rem; }
        #successMessage h4 { font-size: 1.4rem; color: var(--success-color); margin-bottom: 0.5rem; font-weight: 700; }
        #successMessage p { color: var(--text-light); font-size: 0.9rem; line-height: 1.6; }

        /* ================================================
           FOOTER
           ================================================ */
        .app-footer {
            text-align: center;
            padding: 1.25rem 1rem;
            border-top: 1px solid var(--border-light);
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.5;
            background-color: #FAFCFA;
        }

        /* ================================================
           RESPONSIVE: TABLETS & DESKTOPS (min-width: 480px)
           ================================================ */
        @media (min-width: 480px) {
            .search-form {
                flex-direction: row;
                gap: 10px;
            }
            .search-form .app-button {
                width: auto;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .verify-row {
                flex-direction: row;
                gap: 10px;
            }
            .verify-row .app-button {
                width: auto;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .view { padding: 2rem 1.75rem 2.5rem; }
            .header { padding: 2.5rem 2rem 2rem; }
            .header img { max-width: 160px; }
            .header h3 { font-size: 1.35rem; }
            .info-card { padding: 1.5rem; }
            .details-box { padding: 1.5rem; }
        }

        /* ================================================
           RESPONSIVE: DESKTOPS (min-width: 640px)
           ================================================ */
        @media (min-width: 640px) {
            body { padding: 2rem 1rem; }
            .container {
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-lg);
                border: 1px solid var(--border-color);
                min-height: auto;
                margin: 0 auto;
            }
            .view { padding: 2.5rem 2.5rem 3rem; }
            .header { padding: 2.5rem 2rem; }
            .header img { max-width: 180px; }
            .header h3 { font-size: 1.5rem; }
            .view > h3 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <img id="logo" src="" alt="Institute Logo">
            <h3 id="appTitle"></h3>
        </header>

        <main id="app-content">
            <!-- VIEW 1: LANDING PAGE -->
            <div id="landingView" class="view" style="display: <?= initialView === 'landingView' ? 'block' : 'none' ?>;">
                <h3>স্বাগতম!</h3>
                <p>অনুগ্রহ করে নিচের অপশন থেকে আপনার প্রয়োজনীয় সেবাটি নির্বাচন করুন।</p>
                <button id="resultBtn" class="app-button nav-button btn-primary" onclick="showView('resultView')">ফলাফল দেখুন</button>
                <button id="paymentBtn" class="app-button nav-button btn-secondary" onclick="showView('paymentView')">অ্যাডমিট কার্ড ফি দিন</button>
                <button id="statusBtn" class="app-button nav-button btn-tertiary" onclick="showView('statusCheckView')">পেমেন্ট স্ট্যাটাস দেখুন</button>
            </div>
        
            <!-- VIEW 2: RESULT CHECKER -->
            <div id="resultView" class="view" style="display: <?= initialView === 'resultView' ? 'block' : 'none' ?>;">
                <?!= include('ResultView'); ?>
            </div>

            <!-- VIEW 3: PAYMENT FORM -->
            <div id="paymentView" class="view" style="display: <?= initialView === 'paymentView' ? 'block' : 'none' ?>;">
                <?!= include('PaymentView'); ?>
            </div>

            <!-- VIEW 4: PAYMENT STATUS CHECKER -->
            <div id="statusCheckView" class="view" style="display: <?= initialView === 'statusCheckView' ? 'block' : 'none' ?>;">
                <?!= include('StatusCheckView'); ?>
            </div>
        </main>

        <footer class="app-footer">
            <span id="footerInstituteName"></span>
        </footer>
    </div>

<script>
    // ================================================
    //      GLOBAL APP LOGIC & NAVIGATION
    // ================================================
    const settings = <?!= JSON.stringify(settings) ?>;

    document.addEventListener('DOMContentLoaded', function() {
        // Populate header and other dynamic content that isn't part of a specific view
        document.getElementById('logo').src = settings.logoUrl;
        document.getElementById('appTitle').innerText = settings.appTitle;
        
        // Populate the instructions box for the payment view
        const instructionsEl = document.getElementById('instructions');
        if (instructionsEl) {
            instructionsEl.innerHTML = settings.instructions || '';
        }

        // Populate the payment options dropdown menu
        const paymentMethodSelect = document.getElementById('paymentMethod');
        if (paymentMethodSelect) {
            paymentMethodSelect.innerHTML = '<option value="" disabled selected>-- একটি মাধ্যম নির্বাচন করুন --</option>';
            if (settings.paymentOptions) {
                settings.paymentOptions.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    paymentMethodSelect.appendChild(option);
                });
            }
        }

        // Dynamically show/hide buttons on the landing page based on sheet settings.
        if (!settings.resultCheckerActive) {
            const btn = document.getElementById('resultBtn');
            if (btn) btn.style.display = 'none';
        }
        if (!settings.paymentFormActive) {
            const btn = document.getElementById('paymentBtn');
            if (btn) btn.style.display = 'none';
        }
        if (!settings.statusCheckActive) {
            const btn = document.getElementById('statusBtn');
            if (btn) btn.style.display = 'none';
        }

        // Hide back buttons when only a single view is directly loaded
        const initialView = '<?= initialView ?>';
        if (initialView !== 'landingView') {
            document.querySelectorAll('.back-button').forEach(btn => btn.style.display = 'none');
        }

        // Populate footer
        const footerEl = document.getElementById('footerInstituteName');
        if (footerEl) {
            footerEl.innerText = settings.instituteName || settings.appTitle || '';
        }
    });

    /**
     * Handles navigation between different views/pages of the app.
     * @param {string} viewId The ID of the view to display.
     */
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(view => view.style.display = 'none');
        const view = document.getElementById(viewId);
        if (view) view.style.display = 'block';
    }

    // ================================================
    //      RESULT CHECKER - CLIENT-SIDE LOGIC
    // ================================================
    const resultSearchForm = document.getElementById('resultSearchForm');
    if (resultSearchForm) {
        resultSearchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const searchKey = document.getElementById('resultSearchInput').value;
            const resultDisplay = document.getElementById('resultDisplay');
            const loader = document.getElementById('resultLoader');
            
            resultDisplay.innerHTML = "";
            loader.style.display = 'block';
            this.querySelector('button').disabled = true;

            google.script.run
                .withSuccessHandler(onResultSuccess)
                .withFailureHandler(onResultFailure)
                .searchStudentData(searchKey);
        });
    }

    function onResultSuccess(response) {
        document.getElementById('resultLoader').style.display = 'none';
        document.getElementById('resultSearchForm').querySelector('button').disabled = false;
        const resultDiv = document.getElementById('resultDisplay');

        if (response.status === 'found') {
            const student = response.data;
            let statusClass = 'info-card status-viva'; // Default class
            if (String(student.Status).toLowerCase().includes('finally')) statusClass = 'info-card status-final';
            if (String(student.Status).toLowerCase().includes('not selected')) statusClass = 'info-card status-not-selected';
            if (String(student.Status).toLowerCase().includes('waiting')) statusClass = 'info-card status-waiting';

            let detailsHtml = '';
            for (const key in student) {
                if (student[key] && key !== 'Name' && key !== 'Message') {
                    const value = (key === 'Phone Number') ? maskPhoneNumber(student[key]) : student[key];
                    detailsHtml += `<div class="info-item"><span class="label">${key}</span><span>${value}</span></div>`;
                }
            }
            resultDiv.innerHTML = `
                <div class="${statusClass}">
                    <h3>${student.Name || 'নাম পাওয়া যায়নি'}</h3>
                    <p>${student.Message || 'আপনার স্ট্যাটাস নিচে দেখুন।'}</p>
                    <div class="info-grid">${detailsHtml}</div>
                </div>`;
        } else if (response.status === 'not_found') {
            resultDiv.innerHTML = `<div class="info-card status-not-selected"><h3>দুঃখিত, আপনি নির্বাচিত হননি</h3><p>আপনার দেওয়া তথ্যটি আমাদের তালিকায় পাওয়া যায়নি। আমাদের প্রতিষ্ঠানে আগ্রহ প্রকাশের জন্য ধন্যবাদ। আপনার জন্য শুভকামনা রইল।</p></div>`;
        } else {
             resultDiv.innerHTML = `<div class="info-card status-not-selected"><h3>সিস্টেম ত্রুটি</h3><p>${response.message}</p></div>`;
        }
    }
    
    function onResultFailure(error) {
         document.getElementById('resultLoader').style.display = 'none';
         document.getElementById('resultSearchForm').querySelector('button').disabled = false;
         document.getElementById('resultDisplay').innerHTML = `<div class="info-card status-not-selected"><h3>সংযোগ বিচ্ছিন্ন</h3><p>সার্ভারের সাথে সংযোগে সমস্যা হচ্ছে। অনুগ্রহ করে আপনার ইন্টারনেট সংযোগ পরীক্ষা করে আবার চেষ্টা করুন।</p></div>`;
    }

    function maskPhoneNumber(number) {
        const numStr = String(number);
        if (!numStr || numStr.length < 11) return "N/A";
        return `${numStr.substring(0, 3)}****${numStr.substring(numStr.length - 4)}`;
    }

    // ================================================
    //      PAYMENT FORM - CLIENT-SIDE LOGIC
    // ================================================
    
    function verifyPhoneNumber() {
        const phoneInput = document.getElementById('phone');
        const phone = phoneInput.value.trim();
        const statusDiv = document.getElementById('paymentStatus');
        
        if (!/^01[3-9]\d{8}$/.test(phone)) {
            statusDiv.innerHTML = `<span class="text-danger">সঠিক ১১-ডিজিটের মোবাইল নম্বর দিন (যেমন: 017...)</span>`;
            return;
        }

        const loader = document.getElementById('paymentLoader');
        loader.style.display = 'block';
        statusDiv.innerText = "আপনার তথ্য খোঁজা হচ্ছে...";
        document.getElementById('detailsSection').style.display = 'none';

        google.script.run
            .withSuccessHandler(onUserSearchSuccess)
            .withFailureHandler(onUserSearchFailure)
            .getUserDetails(phone);
    }
    
    function onUserSearchSuccess(response) {
        document.getElementById('paymentLoader').style.display = 'none';
        const statusDiv = document.getElementById('paymentStatus');
        const detailsSection = document.getElementById('detailsSection');
        if (response.found) {
            statusDiv.innerHTML = '<span class="text-success">আপনার তথ্য পাওয়া গেছে। অনুগ্রহ করে নিচের ফর্মটি পূরণ করুন।</span>';
            detailsSection.style.display = 'block';
            document.getElementById('nameDisplay').innerText = response.name;
            document.getElementById('serialDisplay').innerText = response.serial;
            document.getElementById('nameInput').value = response.name;
            document.getElementById('serialInput').value = response.serial;
            document.getElementById('districtInput').value = response.district;
        } else {
            statusDiv.innerHTML = `<span class="text-danger">${response.message}</span>`;
            detailsSection.style.display = 'none';
        }
    }

    function onUserSearchFailure(error) {
        document.getElementById('paymentLoader').style.display = 'none';
        document.getElementById('paymentStatus').innerHTML = '<span class="text-danger">সার্ভারের সাথে সংযোগে সমস্যা হচ্ছে। অনুগ্রহ করে আবার চেষ্টা করুন।</span>';
    }

    const paymentForm = document.getElementById('paymentForm');
    if (paymentForm) {
        paymentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const paymentSource = document.getElementById('paymentSource').value;
            if (!/^01[3-9]\d{8}$/.test(paymentSource)) {
                 alert("অনুগ্রহ করে 'যে নম্বর থেকে টাকা পাঠিয়েছেন' ফিল্ডে একটি সঠিক ১১-ডিজিটের মোবাইল নম্বর দিন।");
                 return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loader" style="display: block; margin: 0 auto; width: 24px; height: 24px; border-top-color: white;"></div>';
            
            const formObject = Object.fromEntries(new FormData(this).entries());

            google.script.run
                .withSuccessHandler(onPaymentSuccess)
                .withFailureHandler(onPaymentFailure)
                .handlePost({ action: 'submitPayment', formData: formObject });
        });
    }

    /**
     * CRITICAL FIX: This function now correctly handles the structured JSON object
     * received from the server, preventing the 'undefined' error.
     */
    function onPaymentSuccess(response) {
        // Check if the response object has a 'success' key
        if (response && response.success) {
            document.getElementById('paymentView').innerHTML = `
                <div id="successMessage">
                    <h4>ধন্যবাদ!</h4>
                    <p>${response.success}</p>
                </div>`;
        } 
        // Otherwise, check if it has an 'error' key
        else if (response && response.error) {
            document.getElementById('paymentView').innerHTML = `
                <div id="successMessage" style="background-color: #F9EBEA;">
                    <h4 style="color: var(--danger-color);">ত্রুটি</h4>
                    <p>${response.error}</p>
                </div>`;
        }
        // Fallback for any unexpected response format
        else {
            document.getElementById('paymentView').innerHTML = `
                <div id="successMessage">
                    <h4>সম্পন্ন হয়েছে</h4>
                    <p>আপনার অনুরোধটি প্রক্রিয়া করা হয়েছে।</p>
                </div>`;
        }
    }

    function onPaymentFailure(error) {
        document.getElementById('paymentView').innerHTML = `
            <div id="successMessage" style="background-color: #F9EBEA;">
                <h4 style="color: var(--danger-color);">সংযোগ বিচ্ছিন্ন</h4>
                <p>সার্ভারের সাথে সংযোগে সমস্যা হচ্ছে। অনুগ্রহ করে আপনার ইন্টারনেট সংযোগ পরীক্ষা করে আবার চেষ্টা করুন।</p>
            </div>`;
    }

    // ================================================
    //      PAYMENT STATUS CHECKER - CLIENT-SIDE LOGIC
    // ================================================
    const statusSearchForm = document.getElementById('statusSearchForm');
    if (statusSearchForm) {
        statusSearchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('statusSearchInput').value;
            const statusDisplay = document.getElementById('statusDisplay');
            const loader = document.getElementById('statusLoader');
            
            statusDisplay.innerHTML = "";
            loader.style.display = 'block';
            this.querySelector('button').disabled = true;

            google.script.run
                .withSuccessHandler(onStatusCheckSuccess)
                .withFailureHandler(onStatusCheckFailure)
                .getPaymentStatus(phone);
        });
    }

    function onStatusCheckSuccess(response) {
        document.getElementById('statusLoader').style.display = 'none';
        document.getElementById('statusSearchForm').querySelector('button').disabled = false;
        const statusDiv = document.getElementById('statusDisplay');

        let statusClass = 'info-card status-waiting'; // Default
        if (response.found) {
            if (response.status === 'Approved') statusClass = 'info-card status-final';
            if (response.status === 'Rejected') statusClass = 'info-card status-not-selected';
        } else {
            statusClass = 'info-card status-not-selected';
        }

        statusDiv.innerHTML = `<div class="${statusClass}"><p style="margin:0;">${response.message}</p></div>`;
    }

    function onStatusCheckFailure(error) {
        document.getElementById('statusLoader').style.display = 'none';
        document.getElementById('statusSearchForm').querySelector('button').disabled = false;
        document.getElementById('statusDisplay').innerHTML = '<div class="info-card status-not-selected"><p style="margin:0;">সার্ভারের সাথে সংযোগে সমস্যা হচ্ছে। অনুগ্রহ করে আবার চেষ্টা করুন।</p></div>';
    }

</script>
</body>
</html>
