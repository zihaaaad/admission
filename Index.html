<!DOCTYPE html>
<html lang="bn">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon for brand identity in the browser tab -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/RZ4wD83V/skill-color-logo-32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Improved Bengali font for better readability and number rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================
           GLOBAL STYLES & UI KIT - DEEP FOREST NATURAL THEME
           Mobile-First Responsive Design
           ================================================ */
        :root {
            --primary-color: #1A3E2F;
            --primary-light: #2D5A46;
            --primary-subtle: #E8F0EB;
            --success-color: #2E6B4E;
            --danger-color: #8C2D19;
            --bg-color: #F0F3F1;
            --text-dark: #1E2722;
            --text-light: #52635A;
            --text-muted: #8A9690;
            --card-bg: #FFFFFF;
            --border-color: #D0DCD5;
            --border-light: #E8EDEA;
            --shadow-sm: 0 2px 8px rgba(26, 62, 47, 0.04);
            --shadow-md: 0 8px 24px rgba(26, 62, 47, 0.06);
            --shadow-lg: 0 12px 40px rgba(26, 62, 47, 0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.65;
            min-height: 100vh;
        }

        .font-numeric {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        /* --- Container: Edge-to-edge on phones --- */
        .container {
            max-width: 580px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header & Navigation Bar --- */
        .header {
            position: relative;
            padding: 1.5rem 1.25rem;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(180deg, #FAFCFA 0%, #FFFFFF 100%);
        }
        .header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .header-back-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            opacity: 0;
            visibility: hidden;
        }
        .header-back-btn:hover {
            background-color: var(--primary-subtle);
            color: var(--primary-color);
        }
        .header-back-btn:active {
            transform: scale(0.9);
        }
        .header-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            text-align: center;
        }
        .header-brand img {
            max-height: 54px;
            width: auto;
            margin-bottom: 0.5rem;
            transition: transform 0.3s ease;
        }
        .header-brand img:hover {
            transform: scale(1.05);
        }
        .header-brand h3 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.01em;
            line-height: 1.3;
        }
        .header-nav-placeholder {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
        }

        /* --- Views --- */
        .view {
            display: none;
            padding: 1.5rem 1.25rem 2rem;
            animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            flex-grow: 1;
        }
        .view > h3 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.4rem;
        }
        .view > p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            line-height: 1.6;
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(6px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- Form Controls --- */
        .app-input, .app-select {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 0.95rem;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border-color);
            transition: all 0.2s ease;
            font-family: 'Noto Sans Bengali', sans-serif;
            background-color: #FCFDFC;
            color: var(--text-dark);
            outline: none;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }
        .app-input:focus, .app-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(26, 62, 47, 0.1), inset 0 1px 2px rgba(0,0,0,0.02);
            background-color: #FFFFFF;
        }
        .app-input::placeholder { color: var(--text-muted); }

        .app-select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2352635A' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.1rem;
            padding-right: 2.5rem;
        }

        /* --- Buttons --- */
        .app-button {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.85rem 1.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            background-color: var(--primary-color);
            min-height: 48px;
            font-family: 'Noto Sans Bengali', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 4px rgba(26, 62, 47, 0.08);
        }
        .app-button:hover:not(:disabled) {
            background-color: var(--primary-light);
            transform: translateY(-1.5px);
            box-shadow: 0 6px 16px rgba(26, 62, 47, 0.16);
        }
        .app-button:active:not(:disabled) {
            transform: translateY(0.5px) scale(0.98);
            box-shadow: 0 2px 4px rgba(26, 62, 47, 0.08);
        }
        .app-button:disabled {
            background-color: #C3CDC7;
            color: #7A8B82;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- Loader --- */
        .loader {
            display: none;
            border: 3.5px solid var(--border-light);
            border-radius: 50%;
            border-top: 3.5px solid var(--primary-color);
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* --- Back Button --- */
        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .back-nav { 
            margin-top: 2rem; 
            text-align: center; 
            padding-top: 1.5rem; 
            border-top: 1px solid var(--border-light); 
        }

        /* --- Status & Label --- */
        .status-text { font-weight: 500; margin-top: 0.5rem; min-height: 20px; font-size: 0.85rem; line-height: 1.5; }
        .text-success { color: var(--success-color); }
        .text-danger { color: var(--danger-color); }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; color: var(--primary-color); }
        
        /* ================================================
           LANDING PAGE
           ================================================ */
        #landingView { text-align: center; }
        #landingView h3 {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        #landingView > p {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 1.5rem;
        }
        .nav-button {
            padding: 0.95rem 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            border: 1.5px solid transparent;
            border-radius: var(--radius-md);
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%); 
        }
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-light) 0%, #366B53 100%);
        }
        .btn-secondary {
            background-color: transparent;
            border: 1.5px solid var(--primary-color);
            color: var(--primary-color);
            box-shadow: none;
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: var(--primary-subtle);
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .btn-tertiary {
            background-color: transparent;
            border: 1.5px solid var(--border-color);
            color: var(--text-light);
            box-shadow: none;
        }
        .btn-tertiary:hover:not(:disabled) {
            background-color: #F0F3F1;
            color: var(--text-dark);
            border-color: var(--text-light);
        }

        /* ================================================
           SEARCH FORMS (Result & Status)
           ================================================ */
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .search-form .app-button {
            margin-top: 0;
        }

        /* ================================================
           RESULT & STATUS CARDS (Premium UI Upgrade)
           ================================================ */
        .info-card {
            margin-top: 1.25rem;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1.5px solid var(--border-color);
            background-color: #FFFFFF;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .info-card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .status-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-icon {
            width: 24px;
            height: 24px;
        }
        .info-card-title {
            flex-grow: 1;
        }
        .info-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.2rem;
            line-height: 1.4;
        }
        .info-card p {
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.55;
        }
        
        .status-final {
            border-color: #A3D9C9;
            background: linear-gradient(145deg, #F2FAF6 0%, #FFFFFF 100%);
        }
        .status-final .status-icon-wrapper {
            background-color: #D2F0E6;
            color: var(--success-color);
        }
        .status-final h3 {
            color: var(--success-color);
        }
        
        .status-viva, .status-waiting {
            border-color: #B2D8C6;
            background: linear-gradient(145deg, #F5FAF7 0%, #FFFFFF 100%);
        }
        .status-viva .status-icon-wrapper, .status-waiting .status-icon-wrapper {
            background-color: #D6EFE3;
            color: var(--primary-light);
        }
        .status-viva h3, .status-waiting h3 {
            color: var(--primary-light);
        }
        
        .status-not-selected {
            border-color: #F5C6BC;
            background: linear-gradient(145deg, #FDF6F5 0%, #FFFFFF 100%);
        }
        .status-not-selected .status-icon-wrapper {
            background-color: #FADAD2;
            color: var(--danger-color);
        }
        .status-not-selected h3 {
            color: var(--danger-color);
        }
        
        .info-grid {
            margin-top: 0.5rem;
            border-top: 1px dashed var(--border-color);
            padding-top: 0.5rem;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.65rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-light);
            gap: 0.75rem;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-item .label {
            font-weight: 600;
            color: var(--text-light);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .info-item .val {
            text-align: right;
            word-break: break-all;
            color: var(--text-dark);
            font-weight: 500;
        }

        /* ================================================
           PAYMENT FORM
           ================================================ */
        .instructions-box {
            background: #FCFAF6;
            border: 1.5px solid #EDE2CF;
            padding: 1rem 1.1rem;
            margin-bottom: 1.5rem;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            color: #735F3F;
            line-height: 1.65;
        }
        .instructions-box h3 {
            font-size: 0.92rem;
            font-weight: 700;
            color: #8B6B3D;
            margin-bottom: 0.4rem;
        }
        .verify-row {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .verify-row .app-button {
            margin-top: 0;
        }
        .form-group { margin-bottom: 1.1rem; }
        .details-box {
            background-color: #FAFCFA;
            padding: 1.25rem;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--success-color);
            margin-top: 1.25rem;
        }
        .candidate-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed var(--border-color);
            font-size: 0.95rem;
        }
        .candidate-info p { margin: 0; }

        #successMessage { text-align: center; padding: 2.5rem 1.25rem; }
        #successMessage h4 { font-size: 1.4rem; color: var(--success-color); margin-bottom: 0.5rem; font-weight: 700; }
        #successMessage p { color: var(--text-light); font-size: 0.9rem; line-height: 1.6; }

        /* ================================================
           FOOTER
           ================================================ */
        .app-footer {
            text-align: center;
            padding: 1.25rem 1rem;
            border-top: 1px solid var(--border-light);
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.5;
            background-color: #FAFCFA;
        }

        /* ================================================
           RESPONSIVE: TABLETS & DESKTOPS (min-width: 480px)
           ================================================ */
        @media (min-width: 480px) {
            .search-form {
                flex-direction: row;
                gap: 10px;
            }
            .search-form .app-button {
                width: auto;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .verify-row {
                flex-direction: row;
                gap: 10px;
            }
            .verify-row .app-button {
                width: auto;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .view { padding: 2rem 1.75rem 2.5rem; }
            .header { padding: 2rem 1.75rem; }
            .info-card { padding: 1.5rem; }
            .details-box { padding: 1.5rem; }
        }

        /* ================================================
           RESPONSIVE: DESKTOPS (min-width: 640px)
           ================================================ */
        @media (min-width: 640px) {
            body { padding: 2rem 1rem; }
            .container {
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-lg);
                border: 1px solid var(--border-color);
                min-height: auto;
                margin: 0 auto;
            }
            .view { padding: 2.5rem 2.5rem 3rem; }
            .header { padding: 2.2rem 2.5rem 1.8rem; }
            .header-brand h3 { font-size: 1.35rem; }
            .view > h3 { font-size: 1.25rem; }
        }

        /* --- Custom Modal Dialog --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(26, 62, 47, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
            animation: modalFadeIn 0.25s ease-out;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
            border: 1px solid var(--border-color);
            animation: modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalSlideUp {
            from { transform: translateY(15px); }
            to { transform: translateY(0); }
        }
        .modal-header {
            padding: 1.25rem 1.25rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-light);
        }
        .modal-header h4 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        .modal-body {
            padding: 1.25rem;
            font-size: 0.95rem;
            color: var(--text-dark);
            line-height: 1.6;
        }
        .modal-footer {
            padding: 0.75rem 1.25rem 1.25rem;
            text-align: right;
        }
        .modal-footer .app-button {
            margin-top: 0;
            width: auto;
            min-width: 100px;
            padding: 0.6rem 1.5rem;
            min-height: 40px;
        }
        
        .header-brand.no-logo h3 {
            font-size: 1.35rem;
            font-weight: 700;
            padding: 0.4rem 0;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-nav">
                <button id="headerBackBtn" class="header-back-btn" onclick="goBackHome()" style="visibility: hidden;" aria-label="ফিরে যান">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="header-brand">
                    <img id="logo" src="" alt="Institute Logo">
                    <h3 id="appTitle"></h3>
                </div>
                <div class="header-nav-placeholder"></div>
            </div>
        </header>

        <main id="app-content">
            <!-- VIEW 1: LANDING PAGE -->
            <div id="landingView" class="view" style="display: <?= initialView === 'landingView' ? 'block' : 'none' ?>;">
                <h3>স্বাগতম!</h3>
                <p>নিচের অপশন থেকে আপনার প্রয়োজনীয় সেবাটি বেছে নিন।</p>
                <button id="resultBtn" class="app-button nav-button btn-primary" onclick="showView('resultView')">ফলাফল দেখুন</button>
                <button id="paymentBtn" class="app-button nav-button btn-secondary" onclick="showView('paymentView')">অ্যাডমিট কার্ড ফি দিন</button>
                <button id="statusBtn" class="app-button nav-button btn-tertiary" onclick="showView('statusCheckView')">পেমেন্ট স্ট্যাটাস দেখুন</button>
            </div>
        
            <!-- VIEW 2: RESULT CHECKER -->
            <div id="resultView" class="view" style="display: <?= initialView === 'resultView' ? 'block' : 'none' ?>;">
                <?!= include('ResultView'); ?>
            </div>

            <!-- VIEW 3: PAYMENT FORM -->
            <div id="paymentView" class="view" style="display: <?= initialView === 'paymentView' ? 'block' : 'none' ?>;">
                <?!= include('PaymentView'); ?>
            </div>

            <!-- VIEW 4: PAYMENT STATUS CHECKER -->
            <div id="statusCheckView" class="view" style="display: <?= initialView === 'statusCheckView' ? 'block' : 'none' ?>;">
                <?!= include('StatusCheckView'); ?>
            </div>
        </main>

        <footer class="app-footer">
            <span id="footerInstituteName"></span>
        </footer>
    </div>

<script>
    // ================================================
    //      GLOBAL APP LOGIC & NAVIGATION
    // ================================================
    const settings = <?!= JSON.stringify(settings) ?>;

    document.addEventListener('DOMContentLoaded', function() {
        // Populate header and other dynamic content that isn't part of a specific view
        const logoEl = document.getElementById('logo');
        const headerBrandEl = document.querySelector('.header-brand');
        const hasLogo = settings.logoUrl && 
                        settings.logoUrl.trim() !== "" && 
                        !settings.logoUrl.toLowerCase().includes("your_") &&
                        !settings.logoUrl.toLowerCase().includes("placeholder");
                        
        if (hasLogo) {
            logoEl.src = settings.logoUrl;
            logoEl.style.display = 'block';
            if (headerBrandEl) headerBrandEl.classList.remove('no-logo');
        } else {
            logoEl.style.display = 'none';
            if (headerBrandEl) headerBrandEl.classList.add('no-logo');
        }
        document.getElementById('appTitle').innerText = settings.appTitle || settings.instituteName || '';
        
        // Populate the instructions box for the payment view
        const instructionsEl = document.getElementById('instructions');
        if (instructionsEl) {
            instructionsEl.innerHTML = settings.instructions || '';
        }

        // Populate the payment options dropdown menu
        const paymentMethodSelect = document.getElementById('paymentMethod');
        if (paymentMethodSelect) {
            paymentMethodSelect.innerHTML = '<option value="" disabled selected>-- একটি মাধ্যম নির্বাচন করুন --</option>';
            if (settings.paymentOptions) {
                settings.paymentOptions.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    paymentMethodSelect.appendChild(option);
                });
            }
        }

        // Dynamically show/hide buttons on the landing page based on sheet settings.
        if (!settings.resultCheckerActive) {
            const btn = document.getElementById('resultBtn');
            if (btn) btn.style.display = 'none';
        }
        if (!settings.paymentFormActive) {
            const btn = document.getElementById('paymentBtn');
            if (btn) btn.style.display = 'none';
        }
        if (!settings.statusCheckActive) {
            const btn = document.getElementById('statusBtn');
            if (btn) btn.style.display = 'none';
        }

        // Set up input key event filters (digits only) and capitalize TrxID
        restrictDigitsOnly('phone');
        restrictDigitsOnly('statusSearchInput');
        restrictDigitsOnly('paymentSource');
        restrictUppercase('trxId');

        // Initial setup and back button controls
        const initialView = '<?= initialView ?>';
        showView(initialView);

        // Hide back buttons when only a single view is directly loaded
        let activeCount = 0;
        if (settings.resultCheckerActive) activeCount++;
        if (settings.paymentFormActive) activeCount++;
        if (settings.statusCheckActive) activeCount++;
        
        if (activeCount <= 1) {
            document.querySelectorAll('.back-nav, .back-button').forEach(btn => btn.style.display = 'none');
        }

        // Populate footer
        const footerEl = document.getElementById('footerInstituteName');
        if (footerEl) {
            footerEl.innerText = settings.instituteName || settings.appTitle || '';
        }
    });

    /**
     * Navigates back to the landing page.
     */
    function goBackHome() {
        showView('landingView');
    }

    /**
     * Filters phone number inputs to allow only numeric digits.
     */
    function restrictDigitsOnly(elementId) {
        const input = document.getElementById(elementId);
        if (input) {
            input.addEventListener('input', function(e) {
                this.value = this.value.replace(/\D/g, '');
            });
        }
    }

    /**
     * Automatically converts input to uppercase (useful for TrxIDs).
     */
    function restrictUppercase(elementId) {
        const input = document.getElementById(elementId);
        if (input) {
            input.addEventListener('input', function(e) {
                this.value = this.value.toUpperCase();
            });
        }
    }

    /**
     * Handles navigation between different views/pages of the app.
     * @param {string} viewId The ID of the view to display.
     */
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(view => view.style.display = 'none');
        const view = document.getElementById(viewId);
        if (view) {
            view.style.display = 'block';
            
            // Dynamic header back button toggle
            const backBtn = document.getElementById('headerBackBtn');
            if (backBtn) {
                let activeCount = 0;
                if (settings.resultCheckerActive) activeCount++;
                if (settings.paymentFormActive) activeCount++;
                if (settings.statusCheckActive) activeCount++;
                
                if (viewId !== 'landingView' && activeCount > 1) {
                    backBtn.style.visibility = 'visible';
                    backBtn.style.opacity = '1';
                } else {
                    backBtn.style.visibility = 'hidden';
                    backBtn.style.opacity = '0';
                }
            }
        }
    }

    // ================================================
    //      RESULT CHECKER - CLIENT-SIDE LOGIC
    // ================================================
    const resultSearchForm = document.getElementById('resultSearchForm');
    if (resultSearchForm) {
        resultSearchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const searchKey = document.getElementById('resultSearchInput').value;
            const resultDisplay = document.getElementById('resultDisplay');
            const loader = document.getElementById('resultLoader');
            
            resultDisplay.innerHTML = "";
            loader.style.display = 'block';
            this.querySelector('button').disabled = true;

            google.script.run
                .withSuccessHandler(onResultSuccess)
                .withFailureHandler(onResultFailure)
                .searchStudentData(searchKey);
        });
    }

    function onResultSuccess(response) {
        document.getElementById('resultLoader').style.display = 'none';
        document.getElementById('resultSearchForm').querySelector('button').disabled = false;
        const resultDiv = document.getElementById('resultDisplay');

        if (response.status === 'found') {
            const student = response.data;
            let statusClass = 'status-viva'; // Default class
            let statusIcon = `<div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>`;

            const statusLower = String(student.Status || '').toLowerCase();
            if (statusLower.includes('finally')) {
                statusClass = 'status-final';
                statusIcon = `<div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div>`;
            } else if (statusLower.includes('not selected') || statusLower.includes('reject')) {
                statusClass = 'status-not-selected';
                statusIcon = `<div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>`;
            } else if (statusLower.includes('waiting')) {
                statusClass = 'status-waiting';
            }

            let detailsHtml = '';
            for (const key in student) {
                if (student[key] && key !== 'Name' && key !== 'Message') {
                    let value = student[key];
                    let valClass = 'val';
                    if (key === 'Phone Number') {
                        value = maskPhoneNumber(value);
                        valClass += ' font-numeric';
                    } else if (key === 'Serial No' || key === 'Roll No' || key === 'TrxID' || key === 'SerialNumber' || key === 'RegisteredPhoneNumber') {
                        valClass += ' font-numeric';
                    }
                    detailsHtml += `<div class="info-item"><span class="label">${key}</span><span class="${valClass}">${value}</span></div>`;
                }
            }
            resultDiv.innerHTML = `
                <div class="info-card ${statusClass}">
                    <div class="info-card-header">
                        ${statusIcon}
                        <div class="info-card-title">
                            <h3>${student.Name || 'নাম পাওয়া যায়নি'}</h3>
                            <p>${student.Message || 'আপনার ফলাফল নিচে দেখুন।'}</p>
                        </div>
                    </div>
                    <div class="info-grid">${detailsHtml}</div>
                </div>`;
        } else if (response.status === 'not_found') {
            resultDiv.innerHTML = `
                <div class="info-card status-not-selected">
                    <div class="info-card-header">
                        <div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>
                        <div class="info-card-title">
                            <h3>কোনো তথ্য পাওয়া যায়নি</h3>
                            <p>আপনার দেওয়া রোল বা ফোন নম্বরটি আমাদের ফলাফলের তালিকায় পাওয়া যায়নি।</p>
                        </div>
                    </div>
                </div>`;
        } else {
            resultDiv.innerHTML = `
                <div class="info-card status-not-selected">
                    <div class="info-card-header">
                        <div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>
                        <div class="info-card-title">
                            <h3>সমস্যা!</h3>
                            <p>${response.message}</p>
                        </div>
                    </div>
                </div>`;
        }
    }
    
    function onResultFailure(error) {
         document.getElementById('resultLoader').style.display = 'none';
         document.getElementById('resultSearchForm').querySelector('button').disabled = false;
         document.getElementById('resultDisplay').innerHTML = `
            <div class="info-card status-not-selected">
                <div class="info-card-header">
                    <div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>
                    <div class="info-card-title">
                        <h3>সার্ভারে সমস্যা</h3>
                        <p>সার্ভারের সাথে সংযোগে সমস্যা হচ্ছে। আপনার ইন্টারনেট সংযোগ চেক করে আবার চেষ্টা করুন।</p>
                    </div>
                </div>
            </div>`;
    }

    function maskPhoneNumber(number) {
        const numStr = String(number);
        if (!numStr || numStr.length < 11) return "N/A";
        return `${numStr.substring(0, 3)}****${numStr.substring(numStr.length - 4)}`;
    }

    // ================================================
    //      PAYMENT FORM - CLIENT-SIDE LOGIC
    // ================================================
    
    function verifyPhoneNumber() {
        const phoneInput = document.getElementById('phone');
        const phone = phoneInput.value.trim();
        const statusDiv = document.getElementById('paymentStatus');
        
        if (!/^01[3-9]\d{8}$/.test(phone)) {
            statusDiv.innerHTML = `<span class="text-danger">সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন (যেমন: 017...)</span>`;
            showModal("মোবাইল নম্বরটি সঠিক নয়", "দয়া করে একটি সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন (যেমন: 017xxxxxxxx)।", "error");
            return;
        }

        const loader = document.getElementById('paymentLoader');
        loader.style.display = 'block';
        statusDiv.innerText = "আপনার তথ্য খোঁজা হচ্ছে...";
        document.getElementById('detailsSection').style.display = 'none';

        google.script.run
            .withSuccessHandler(onUserSearchSuccess)
            .withFailureHandler(onUserSearchFailure)
            .getUserDetails(phone);
    }
    
    function onUserSearchSuccess(response) {
        document.getElementById('paymentLoader').style.display = 'none';
        const statusDiv = document.getElementById('paymentStatus');
        const detailsSection = document.getElementById('detailsSection');
        if (response.found) {
            statusDiv.innerHTML = '<span class="text-success">আপনার তথ্য পাওয়া গেছে। দয়া করে নিচের ফর্মটি পূরণ করুন।</span>';
            detailsSection.style.display = 'block';
            document.getElementById('nameDisplay').innerText = response.name;
            document.getElementById('serialDisplay').innerText = response.serial;
            document.getElementById('nameInput').value = response.name;
            document.getElementById('serialInput').value = response.serial;
            document.getElementById('districtInput').value = response.district;
        } else {
            statusDiv.innerHTML = `<span class="text-danger">${response.message}</span>`;
            detailsSection.style.display = 'none';
        }
    }

    function onUserSearchFailure(error) {
        document.getElementById('paymentLoader').style.display = 'none';
        document.getElementById('paymentStatus').innerHTML = '<span class="text-danger">সার্ভারের সাথে সংযোগে সমস্যা হচ্ছে। দয়া করে আবার চেষ্টা করুন।</span>';
    }

    const paymentForm = document.getElementById('paymentForm');
    if (paymentForm) {
        paymentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const paymentSource = document.getElementById('paymentSource').value;
            if (!/^01[3-9]\d{8}$/.test(paymentSource)) {
                 showModal("মোবাইল নম্বরটি সঠিক নয়", "দয়া করে 'যে নম্বর থেকে টাকা পাঠিয়েছেন' ফিল্ডে একটি সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন (যেমন: 017xxxxxxxx)।", "error");
                 return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loader" style="display: block; margin: 0 auto; width: 24px; height: 24px; border-top-color: white;"></div>';
            
            const formObject = Object.fromEntries(new FormData(this).entries());

            google.script.run
                .withSuccessHandler(onPaymentSuccess)
                .withFailureHandler(onPaymentFailure)
                .handlePost({ action: 'submitPayment', formData: formObject });
        });
    }

    function onPaymentSuccess(response) {
        if (response && response.success) {
            document.getElementById('paymentView').innerHTML = `
                <div class="info-card status-final">
                    <div class="info-card-header">
                        <div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div>
                        <div class="info-card-title">
                            <h3>ধন্যবাদ!</h3>
                            <p>${response.success}</p>
                        </div>
                    </div>
                </div>`;
        } 
        else if (response && response.error) {
            document.getElementById('paymentView').innerHTML = `
                <div class="info-card status-not-selected">
                    <div class="info-card-header">
                        <div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>
                        <div class="info-card-title">
                            <h3>সমস্যা</h3>
                            <p>${response.error}</p>
                        </div>
                    </div>
                </div>`;
        }
        else {
            document.getElementById('paymentView').innerHTML = `
                <div class="info-card status-final">
                    <div class="info-card-header">
                        <div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div>
                        <div class="info-card-title">
                            <h3>সম্পন্ন হয়েছে</h3>
                            <p>আপনার অনুরোধটি প্রসেস করা হয়েছে।</p>
                        </div>
                    </div>
                </div>`;
        }
    }

    function onPaymentFailure(error) {
        document.getElementById('paymentView').innerHTML = `
            <div class="info-card status-not-selected">
                <div class="info-card-header">
                    <div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>
                    <div class="info-card-title">
                        <h3>সংযোগ বিচ্ছিন্ন</h3>
                        <p>সার্ভারের সাথে সংযোগে সমস্যা হচ্ছে। দয়া করে আপনার ইন্টারনেট চেক করে আবার চেষ্টা করুন।</p>
                    </div>
                </div>
            </div>`;
    }

    // ================================================
    //      PAYMENT STATUS CHECKER - CLIENT-SIDE LOGIC
    // ================================================
    const statusSearchForm = document.getElementById('statusSearchForm');
    if (statusSearchForm) {
        statusSearchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('statusSearchInput').value;
            const statusDisplay = document.getElementById('statusDisplay');
            const loader = document.getElementById('statusLoader');
            
            statusDisplay.innerHTML = "";
            loader.style.display = 'block';
            this.querySelector('button').disabled = true;

            google.script.run
                .withSuccessHandler(onStatusCheckSuccess)
                .withFailureHandler(onStatusCheckFailure)
                .getPaymentStatus(phone);
        });
    }

    function onStatusCheckSuccess(response) {
        document.getElementById('statusLoader').style.display = 'none';
        document.getElementById('statusSearchForm').querySelector('button').disabled = false;
        const statusDiv = document.getElementById('statusDisplay');

        let statusClass = 'status-waiting'; // Default
        let statusIcon = `<div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>`;
        let title = "পেমেন্ট চেক";

        if (response.found) {
            if (response.status === 'Approved') {
                statusClass = 'status-final';
                statusIcon = `<div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div>`;
                title = "পেমেন্ট অনুমোদিত";
            } else if (response.status === 'Rejected') {
                statusClass = 'status-not-selected';
                statusIcon = `<div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>`;
                title = "পেমেন্ট বাতিল";
            } else {
                title = "চেক করা হচ্ছে";
            }
            statusDiv.innerHTML = `
                <div class="info-card ${statusClass}">
                    <div class="info-card-header">
                        ${statusIcon}
                        <div class="info-card-title">
                            <h3>${title}</h3>
                            <p>${response.message}</p>
                        </div>
                    </div>
                </div>`;
        } else {
            statusClass = 'status-not-selected';
            statusIcon = `<div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>`;
            statusDiv.innerHTML = `
                <div class="info-card ${statusClass}">
                    <div class="info-card-header">
                        ${statusIcon}
                        <div class="info-card-title">
                            <h3>রেকর্ড পাওয়া যায়নি</h3>
                            <p>${response.message}</p>
                        </div>
                    </div>
                </div>`;
        }
    }

    function onStatusCheckFailure(error) {
        document.getElementById('statusLoader').style.display = 'none';
        document.getElementById('statusSearchForm').querySelector('button').disabled = false;
        document.getElementById('statusDisplay').innerHTML = `
            <div class="info-card status-not-selected">
                <div class="info-card-header">
                    <div class="status-icon-wrapper"><svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>
                    <div class="info-card-title">
                        <h3>সংযোগ বিচ্ছিন্ন</h3>
                        <p>সার্ভারের সাথে সংযোগে সমস্যা হচ্ছে। দয়া করে আপনার ইন্টারনেট চেক করে আবার চেষ্টা করুন।</p>
                    </div>
                </div>
            </div>`;
    }
    /* ================================================
       CUSTOM MODAL POPUP DIALOG
       ================================================ */
    function showModal(title, message, type = 'info') {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = message;
        
        const iconWrapper = document.getElementById('modalIcon');
        if (type === 'error') {
            iconWrapper.innerHTML = `<svg style="color: var(--danger-color); width: 28px; height: 28px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
        } else if (type === 'success') {
            iconWrapper.innerHTML = `<svg style="color: var(--success-color); width: 28px; height: 28px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
        } else {
            iconWrapper.innerHTML = `<svg style="color: var(--primary-light); width: 28px; height: 28px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
        }
        
        const modal = document.getElementById('customModal');
        modal.style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
    }
</script>

<!-- Custom Modal Popup -->

        <div class="modal-header">
            <span id="modalIcon"></span>
            <h4 id="modalTitle">বিজ্ঞপ্তি</h4>
        </div>
        <div class="modal-body">
            <p id="modalMessage"></p>
        </div>
        <div class="modal-footer">
            <button class="app-button" onclick="closeModal()">ঠিক আছে</button>

</div>
